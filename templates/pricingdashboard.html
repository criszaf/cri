<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing Management</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        background: #f4f6f9;
      }

      .sidebar {
        width: 230px;
        background: #2f3542;
        color: white;
        padding: 20px;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 8px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #57606f;
      }

      .main {
        flex: 1;
        padding: 30px;
      }

      .header {
        margin-bottom: 25px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      .message-list {
        margin-bottom: 20px;
      }

      .message-list {
        padding: 12px 14px;
        border-radius: 8px;
        display: none;
      }

      .message-list.success {
        background: #dcfce7;
        color: #166534;
        display: block;
      }

      .message-list.error {
        background: #fee2e2;
        color: #991b1b;
        display: block;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 15px;
      }

      .field label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #555;
      }

      .field input,
      .field select,
      .field button {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
      }

      .field button {
        border: none;
        background: #2f3542;
        color: white;
        cursor: pointer;
      }

      table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead,
      tbody tr {
        display: table;
        width: 100%;
        table-layout: fixed;
      }

      tbody {
        display: block;
        max-height: 320px;
        overflow-y: auto;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
        vertical-align: top;
      }

      .history-list {
        list-style: none;
      }

      .history-list li {
        margin-bottom: 8px;
        font-size: 13px;
      }

      .empty-state {
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>User</h2>

      <a href="{{ url_for('userdashboard') }}">Dashboard</a>
      <a
        href="{{ url_for('userdashboard_section', section='pricing') }}"
        class="active"
        >Pricing Management</a
      >
      <a href="{{ url_for('userdashboard_section', section='discount') }}"
        >Discount Management</a
      >
      <a href="{{ url_for('userdashboard_section', section='settings') }}"
        >Settings</a
      >
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="main">
      <div class="message-list" id="statusMessage"></div>

      <div class="header">
        <h1>Pricing Management</h1>
        <p>Welcome, {{ username }}</p>
      </div>

      <div class="card">
        <h3>Set Product Base Price</h3>

        <form id="pricingForm">
          <div class="form-row">
            <div class="field">
              <label for="product_id">Product ID</label>
              <input type="text" name="product_id" id="product_id" required />
            </div>

            <div class="field">
              <label for="price">Price</label>
              <input
                type="number"
                name="price"
                id="price"
                step="0.01"
                min="0.01"
                required
              />
            </div>

            <div class="field">
              <label>&nbsp;</label>
              <button type="submit">Save Price</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Product List and Base Price</h3>
        <table>
          <thead>
            <tr>
              <th>Product ID</th>
              <th>Base Price</th>
              <th>Price History</th>
            </tr>
          </thead>
          <tbody id="pricingTableBody"></tbody>
          <!-- diri mo load ag mga gipang save nga products -->
        </table>
      </div>
    </div>

    <script>
      const storageKey = "pricing_products";
      const pricingForm = document.getElementById("pricingForm");
      const productIdInput = document.getElementById("product_id");
      const priceInput = document.getElementById("price");
      const pricingTableBody = document.getElementById("pricingTableBody");
      const statusMessage = document.getElementById("statusMessage");
      const productListId = "savedProductIds";

      function getProducts() {
        const savedProducts = localStorage.getItem(storageKey);
        return savedProducts ? JSON.parse(savedProducts) : [];
      }

      function saveProducts(products) {
        localStorage.setItem(storageKey, JSON.stringify(products));
      }

      function renderProductOptions() {
        const products = getProducts().slice().sort((a, b) => Number(a.id) - Number(b.id));
        let datalist = document.getElementById(productListId);

        if (!datalist) {
          datalist = document.createElement("datalist");
          datalist.id = productListId;
          document.body.appendChild(datalist);
        }

        datalist.innerHTML = products
          .map((product) => `<option value="${product.id}"></option>`)
          .join("");

        productIdInput.setAttribute("list", productListId);
      }

      function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "message-list " + type;
      }

      function formatPrice(price) {
        return Number(price).toFixed(2);
      }

      function renderProducts() {
        const products = getProducts();
        pricingTableBody.innerHTML = "";

        if (products.length === 0) {
          pricingTableBody.innerHTML = `
            <tr>
              <td colspan="3" class="empty-state">No products saved yet.</td>
            </tr>
          `;
          return;
        }

        products.forEach((product) => {
          const historyItems = product.price_history
            .slice()
            .reverse()
            .map((entry) => {
              const priceText =
                entry.old_price === null
                  ? `Initial: ₱${formatPrice(entry.new_price)}`
                  : `₱${formatPrice(entry.old_price)} to ₱${formatPrice(entry.new_price)}`;
              return `<li>${priceText}<br /><small>${entry.timestamp}</small></li>`;
            })
            .join("");

          pricingTableBody.innerHTML += `
            <tr>
              <td>${product.id}</td>
              <td>₱${formatPrice(product.base_price)}</td>
              <td><ul class="history-list">${historyItems}</ul></td>
            </tr>
          `;
        });

        renderProductOptions();
      }

      pricingForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const productId = productIdInput.value.trim();
        const price = priceInput.value.trim();

        if (productId === "" || price === "") {
          showMessage("Product ID and price are required.", "error");
          return;
        }

        if (Number(price) <= 0) {
          showMessage("Price must be greater than 0.", "error");
          return;
        }

        const products = getProducts();
        const existingProduct = products.find(
          (product) => String(product.id) === productId
        );
        const timestamp = new Date().toLocaleString();

        if (existingProduct) {
          const oldPrice = Number(existingProduct.base_price);
          existingProduct.base_price = Number(price);
          existingProduct.price_history.push({
            old_price: oldPrice,
            new_price: Number(price),
            timestamp: timestamp,
          });
          showMessage("Mana, nabag-o na.", "success");
        } else {
          products.push({
            id: productId,
            base_price: Number(price),
            price_history: [
              {
                old_price: null,
                new_price: Number(price),
                timestamp: timestamp,
              },
            ],
          });
          showMessage("Mana, nabutang na.", "success");
        }

        saveProducts(products);
        renderProductOptions();
        renderProducts();
        pricingForm.reset();
      });

      renderProductOptions();
      renderProducts();
    </script>
  </body>
</html>
